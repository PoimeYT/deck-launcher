<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MC Launcher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #181818;
      --surface2: #222222;
      --border: #2a2a2a;
      --accent: #4ade80;
      --accent-dim: #16a34a;
      --text: #f0f0f0;
      --text-dim: #888;
      --focus-ring: 0 0 0 3px rgba(74, 222, 128, 0.5);
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      user-select: none;
      overflow: hidden;
    }

    /* TITLEBAR */
    #titlebar {
      -webkit-app-region: drag;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    #titlebar span { font-size: 13px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.05em; }
    .titlebar-btns { -webkit-app-region: no-drag; display: flex; gap: 8px; }
    .titlebar-btns button {
      background: var(--surface2);
      border: none;
      color: var(--text-dim);
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .titlebar-btns button:hover { background: var(--border); color: var(--text); }
    .titlebar-btns button#close-btn:hover { background: #dc2626; color: white; }

    /* LAYOUT */
    #app {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: calc(100vh - 40px);
    }

    /* SIDEBAR */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 4px;
    }
    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 8px 4px;
    }
    .nav-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s, color 0.15s;
      width: 100%;
    }
    .nav-btn:hover, .nav-btn:focus { background: var(--surface2); color: var(--text); outline: none; }
    .nav-btn.active { background: var(--surface2); color: var(--accent); }
    .nav-btn:focus-visible { box-shadow: var(--focus-ring); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    /* MAIN CONTENT */
    #main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* PAGES */
    .page { display: none; flex: 1; overflow-y: auto; padding: 28px; }
    .page.active { display: flex; flex-direction: column; gap: 24px; }

    h1 { font-size: 26px; font-weight: 900; }
    h2 { font-size: 16px; font-weight: 700; color: var(--text-dim); }

    /* PROFILE CARDS */
    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .profile-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s, transform 0.1s;
      font-family: 'Outfit', sans-serif;
      text-align: left;
    }
    .profile-card:hover, .profile-card:focus {
      border-color: var(--accent);
      transform: translateY(-2px);
      outline: none;
    }
    .profile-card:focus-visible { box-shadow: var(--focus-ring); }
    .profile-card.selected { border-color: var(--accent); background: #0f1f14; }
    .profile-icon { font-size: 28px; }
    .profile-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .profile-version { font-size: 12px; color: var(--text-dim); }

    .add-card {
      border-style: dashed;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      gap: 6px;
    }
    .add-card:hover { color: var(--accent); border-color: var(--accent); }

    /* LAUNCH AREA */
    #launch-bar {
      padding: 16px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }
    #selected-label { flex: 1; font-size: 14px; color: var(--text-dim); }
    #selected-label strong { color: var(--text); }

    #launch-btn {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 800;
      padding: 14px 40px;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.1s;
    }
    #launch-btn:hover { background: #86efac; transform: scale(1.02); }
    #launch-btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    #launch-btn:active { transform: scale(0.98); }
    #launch-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; transform: none; }

    /* SETTINGS PAGE */
    .settings-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { font-size: 14px; font-weight: 600; }
    .settings-row-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .settings-row input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      width: 220px;
    }
    .settings-row input[type="text"]:focus { outline: none; border-color: var(--accent); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<div id="titlebar">
  <span>⛏ MC LAUNCHER</span>
  <div class="titlebar-btns">
    <button id="min-btn" title="Minimize">─</button>
    <button id="close-btn" title="Close">✕</button>
  </div>
</div>

<div id="app">
  <nav id="sidebar">
    <div class="sidebar-label">Menu</div>
    <button class="nav-btn active" data-page="play" tabindex="1">
      <span class="nav-icon">▶</span> Play
    </button>
    <button class="nav-btn" data-page="profiles" tabindex="2">
      <span class="nav-icon">📦</span> Profiles
    </button>
    <button class="nav-btn" data-page="settings" tabindex="3">
      <span class="nav-icon">⚙</span> Settings
    </button>
  </nav>

  <div id="main">

    <!-- PLAY PAGE -->
    <div class="page active" id="page-play">
      <div>
        <h1>Play</h1>
        <h2>Select a profile to launch</h2>
      </div>
      <div class="profiles-grid" id="profiles-grid"></div>
    </div>

    <!-- PROFILES PAGE -->
    <div class="page" id="page-profiles">
      <div>
        <h1>Profiles</h1>
        <h2>Manage your modpacks & versions</h2>
      </div>
      <div class="profiles-grid" id="profiles-grid-2"></div>
    </div>

    <!-- SETTINGS PAGE -->
    <div class="page" id="page-settings">
      <div>
        <h1>Settings</h1>
        <h2>Configure your launcher</h2>
      </div>
      <div class="settings-group">
        <div class="settings-row">
          <div>
            <div class="settings-row-label">Minecraft Username</div>
            <div class="settings-row-desc">Your in-game name</div>
          </div>
          <input type="text" id="username-input" placeholder="Steve" tabindex="10" />
        </div>
        <div class="settings-row">
          <div>
            <div class="settings-row-label">Java Path</div>
            <div class="settings-row-desc">Path to your Java installation</div>
          </div>
          <input type="text" id="java-path-input" placeholder="/usr/bin/java" tabindex="11" />
        </div>
        <div class="settings-row">
          <div>
            <div class="settings-row-label">Allocated RAM</div>
            <div class="settings-row-desc">Memory for Minecraft (MB)</div>
          </div>
          <input type="text" id="ram-input" placeholder="2048" tabindex="12" />
        </div>
      </div>
    </div>

    <!-- LAUNCH BAR -->
    <div id="launch-bar">
      <div id="selected-label">No profile selected</div>
      <button id="launch-btn" disabled tabindex="20">LAUNCH</button>
    </div>

  </div>
</div>

<script>
  // --- Data ---
  const profiles = [
    { id: 1, name: 'Vanilla', version: '1.21.4', icon: '🌿' },
    { id: 2, name: 'Fabric Mods', version: '1.21.4 Fabric', icon: '🧵' },
    { id: 3, name: 'OptiFine', version: '1.20.1', icon: '✨' },
  ]

  let selectedProfile = null

  // --- Render profiles ---
  function renderProfiles(containerId) {
    const grid = document.getElementById(containerId)
    grid.innerHTML = ''
    profiles.forEach(p => {
      const card = document.createElement('button')
      card.className = 'profile-card' + (selectedProfile?.id === p.id ? ' selected' : '')
      card.innerHTML = `<div class="profile-icon">${p.icon}</div><div class="profile-name">${p.name}</div><div class="profile-version">${p.version}</div>`
      card.tabIndex = 4
      card.addEventListener('click', () => selectProfile(p))
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectProfile(p) })
      grid.appendChild(card)
    })
    // Add card
    const add = document.createElement('button')
    add.className = 'profile-card add-card'
    add.innerHTML = `<span style="font-size:22px">＋</span><span>New Profile</span>`
    add.tabIndex = 4
    grid.appendChild(add)
  }

  function selectProfile(p) {
    selectedProfile = p
    document.getElementById('selected-label').innerHTML = `Selected: <strong>${p.name}</strong> — ${p.version}`
    document.getElementById('launch-btn').disabled = false
    renderProfiles('profiles-grid')
    renderProfiles('profiles-grid-2')
  }

  // --- Nav ---
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
      btn.classList.add('active')
      document.getElementById('page-' + btn.dataset.page).classList.add('active')
    })
  })

  // --- Launch ---
  document.getElementById('launch-btn').addEventListener('click', async () => {
    if (!selectedProfile) return
    const btn = document.getElementById('launch-btn')
    btn.textContent = 'LAUNCHING...'
    btn.disabled = true
    try {
      await window.launcher?.launch(selectedProfile)
    } catch(e) { console.error(e) }
    setTimeout(() => { btn.textContent = 'LAUNCH'; btn.disabled = false }, 2000)
  })

  // --- Titlebar ---
  document.getElementById('close-btn').addEventListener('click', () => window.launcher?.close())
  document.getElementById('min-btn').addEventListener('click', () => window.launcher?.minimize())

  // --- Keyboard nav for controller (arrow keys between focusable elements) ---
  document.addEventListener('keydown', e => {
    const focusable = [...document.querySelectorAll('button:not(:disabled), input')]
      .filter(el => el.offsetParent !== null)
    const idx = focusable.indexOf(document.activeElement)
    if (e.key === 'ArrowDown' && idx < focusable.length - 1) { e.preventDefault(); focusable[idx + 1].focus() }
    if (e.key === 'ArrowUp' && idx > 0) { e.preventDefault(); focusable[idx - 1].focus() }
  })

  // --- Init ---
  renderProfiles('profiles-grid')
  renderProfiles('profiles-grid-2')
</script>
</body>
</html>
